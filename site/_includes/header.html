<!-- begin header -->
<header class="c-header">
  <div class="container">
    <div class="row">
      <div class="c-header__inner">

       <div class="logo">
        <a class="logo__link" href="{{ site.baseurl }}/" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
          <img src="{{ site.baseurl }}/images/favicons/favicon.svg" alt="LV" width="30" height="30">
          <span style="font-family:'Cormorant Garamond',Georgia,serif;font-size:1.375rem;font-weight:300;letter-spacing:0.1em;color:#33303a;white-space:nowrap;">
            <span style="color:#5b9eb0;">Laura</span>&thinsp;<span style="color:#d4788a;">Viale</span>
          </span>
        </a>
      </div>       

        <nav class="main-nav">
          <div class="main-nav__box">

            <div class="nav__icon-close">
              <ion-icon class="nav-icon-close" name="close"></ion-icon>
            </div>

            <div class="nav__title">Menu</div>

              <ul class="nav__list list-reset">

              {% for item in site.data.navigation.menu__settings.menu__items %}
                {% if item.submenu %}
                <li class="nav__item dropdown">
                  <span class="nav__link dropdown-toggle">{{ item.title }} <ion-icon class="arrow-down" name="chevron-down"></ion-icon></span>
                  <div class="dropdown-menu">
                    {% for submenu-item in item.submenu %}
                      <a href="{{ submenu-item.url }}" class="nav__link{% assign page_url = page.url | remove: '/' %}{% assign nav_url = submenu-item.url | remove: '/' %}{% if page_url == nav_url %} active-link{% endif %}">{{submenu-item.title}}</a>
                    {% endfor %}
                  </div>
                </li>

                {% else %}
                <li class="nav__item">
                  <a href="{{ item.url | relative_url }}" class="nav__link{% assign page_url = page.url | remove: '/' %}{% assign nav_url = item.url | remove: '/' %}{% if page_url == nav_url %} active-link{% endif %}">{{ item.title }}</a>
                </li>
                {% endif %}
              {% endfor %}

            </ul>
          </div>

        </nav>

        <div class="nav-button">
          <ion-icon class="nav__icon-menu" name="menu-outline"></ion-icon>
        </div>

      </div>
    </div>
  </div>
</header>
<!-- end header -->
